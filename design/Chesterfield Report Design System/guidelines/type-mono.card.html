<!-- @dsCard group="Type" viewport="700x170" name="Mono — Space Mono" subtitle="Data readouts, timestamps, kickers & labels. The HUD voice." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .kicker { font:var(--fw-bold) var(--fs-2xs)/1 var(--font-mono); letter-spacing:var(--ls-wider); text-transform:uppercase; color:var(--neon-teal); }
  .ts { font:var(--fw-regular) var(--fs-sm)/1 var(--font-mono); color:var(--text-muted); }
  .big { font:var(--fw-bold) var(--fs-2xl)/1 var(--font-mono); color:var(--neon-amber); font-variant-numeric:tabular-nums; text-shadow:var(--glow-md-amber); }
  .specs { font:var(--fs-3xs)/1.6 var(--font-mono); color:var(--text-faint); }
</style></head>
<body>
  <div class="stack">
    <span class="kicker">Growth &amp; Development · Updated 19:42 EDT</span>
    <span class="ts">2026-06-10 · 47 stories · 6 beats tracked</span>
    <span class="big">$1,943,200,000</span>
    <span class="specs">Space Mono · 400 / 700 · tabular-nums · UPPERCASE labels track +0.12em</span>
  </div>
</body></html>
