<!-- @dsCard group="Colors" viewport="700x150" name="Heritage nature tones" subtitle="Lifted from the heron seal — river green, heritage gold, heron rust, reed, fog" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-page); }
  .row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  .sw { border:1px solid var(--ink-400); border-radius:var(--radius-sm); overflow:hidden; }
  .chip { height:56px; }
  .meta { padding:8px; }
  .name { font:var(--fw-bold) var(--fs-3xs)/1.2 var(--font-mono); color:var(--text-default); letter-spacing:.04em; }
  .hex { font:var(--fs-3xs)/1.5 var(--font-mono); color:var(--text-faint); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--river-green)"></div><div class="meta"><div class="name">river-green</div><div class="hex">#1f6b53</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--heritage-gold)"></div><div class="meta"><div class="name">heritage-gold</div><div class="hex">#d8a23a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--heron-rust)"></div><div class="meta"><div class="name">heron-rust</div><div class="hex">#b5462f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--reed)"></div><div class="meta"><div class="name">reed</div><div class="hex">#6f8f4a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--fog)"></div><div class="meta"><div class="name">fog</div><div class="hex">#9fb8b2</div></div></div>
  </div>
</body></html>
