<!-- @dsCard group="Brand" viewport="700x220" name="Logo & lockup" subtitle="Neon heron mark, heritage seal, and horizontal wordmark lockup" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-void); }
  .grid { display:grid; grid-template-columns:auto auto 1fr; gap:28px; align-items:center; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
  img { width:88px; height:88px; }
  .neon img { filter:drop-shadow(0 0 10px var(--glow-teal)); }
  .tok { font:var(--fs-3xs)/1 var(--font-mono); color:var(--text-faint); }
  .lockup { display:flex; align-items:center; gap:14px; padding-left:14px; border-left:1px solid var(--ink-600); }
  .lockup img { width:60px; height:60px; filter:drop-shadow(0 0 8px var(--glow-teal)); }
  .wm { display:flex; flex-direction:column; line-height:1; }
  .wm .top { font:var(--fw-bold) 13px/1 var(--font-mono); letter-spacing:.34em; color:var(--neon-teal); text-transform:uppercase; }
  .wm .main { font:var(--fw-bold) 30px/1 var(--font-display); letter-spacing:-.01em; color:var(--text-strong); margin-top:5px; }
  .wm .sub { font:var(--fw-regular) 11px/1 var(--font-mono); letter-spacing:.22em; color:var(--text-muted); text-transform:uppercase; margin-top:6px; }
</style></head>
<body>
  <div class="grid">
    <div class="cell neon"><img src="../assets/logo-mark.svg" alt="neon heron mark"><span class="tok">neon · primary</span></div>
    <div class="cell"><img src="../assets/logo-mark-heritage.svg" alt="heritage heron seal"><span class="tok">heritage · seal</span></div>
    <div class="lockup">
      <img src="../assets/logo-mark.svg" alt="">
      <div class="wm">
        <span class="top">The</span>
        <span class="main">Chesterfield Report</span>
        <span class="sub">Hyperlocal · Chesterfield County, VA</span>
      </div>
    </div>
  </div>
</body></html>
