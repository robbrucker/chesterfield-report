<!-- @dsCard group="Colors" viewport="700x140" name="Text on dark" subtitle="Teal-tinted neutral text ramp — heading, body, secondary, faint" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--bg-page); }
  .stack { display:flex; flex-direction:column; gap:6px; }
  .line { display:flex; align-items:baseline; gap:14px; }
  .tok { font:var(--fw-bold) var(--fs-3xs)/1 var(--font-mono); color:var(--text-faint); width:130px; flex:none; }
  .samp { font:var(--fw-semibold) var(--fs-lg)/1.2 var(--font-display); }
</style></head>
<body>
  <div class="stack">
    <div class="line"><span class="tok">text-strong</span><span class="samp" style="color:var(--text-strong)">County board clears riverfront plan</span></div>
    <div class="line"><span class="tok">text-body</span><span class="samp" style="color:var(--text-body)">County board clears riverfront plan</span></div>
    <div class="line"><span class="tok">text-muted</span><span class="samp" style="color:var(--text-muted)">County board clears riverfront plan</span></div>
    <div class="line"><span class="tok">text-faint</span><span class="samp" style="color:var(--text-faint)">County board clears riverfront plan</span></div>
  </div>
</body></html>
