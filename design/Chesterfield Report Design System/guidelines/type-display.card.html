<!-- @dsCard group="Type" viewport="700x180" name="Display — Chakra Petch" subtitle="Techno grotesk for headlines. Squared terminals, tight leading." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); }
  .eyebrow { font:var(--fw-bold) var(--fs-3xs)/1 var(--font-mono); letter-spacing:var(--ls-wider); text-transform:uppercase; color:var(--neon-teal); margin-bottom:10px; }
  h1 { font:var(--fw-bold) var(--fs-3xl)/var(--lh-tight) var(--font-display); color:var(--text-strong); letter-spacing:var(--ls-tight); margin:0 0 6px; }
  .sub { font:var(--fw-medium) var(--fs-lg)/1.2 var(--font-display); color:var(--text-muted); }
  .specs { font:var(--fs-3xs)/1.6 var(--font-mono); color:var(--text-faint); margin-top:14px; }
</style></head>
<body>
  <div class="eyebrow">// Hyperlocal · Chesterfield County</div>
  <h1>The river votes tonight.</h1>
  <div class="sub">Chakra Petch · 400 / 500 / 600 / 700</div>
  <div class="specs">--text-h1 · 46px · weight 700 · leading 1.04 · tracking −0.02em</div>
</body></html>
