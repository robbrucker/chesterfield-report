<!-- @dsCard group="Colors" viewport="700x150" name="Base surfaces" subtitle="Deep teal-black river-at-night scale — page, panels, wells, lines" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-void); }
  .row { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
  .sw { border:1px solid var(--ink-400); border-radius:var(--radius-sm); overflow:hidden; }
  .chip { height:64px; }
  .meta { padding:7px 8px; }
  .name { font:var(--fw-bold) var(--fs-3xs)/1.2 var(--font-mono); color:var(--text-default); letter-spacing:.04em; }
  .hex { font:var(--fs-3xs)/1.4 var(--font-mono); color:var(--text-faint); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#03090c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="name">ink-800</div><div class="hex">#06141a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#0a1f26</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="meta"><div class="name">ink-600</div><div class="hex">#0e2a33</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">ink-500</div><div class="hex">#123640</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="meta"><div class="name">ink-400</div><div class="hex">#1c4a55</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="meta"><div class="name">ink-300</div><div class="hex">#2a6470</div></div></div>
  </div>
</body></html>
