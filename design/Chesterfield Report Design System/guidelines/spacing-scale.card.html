<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px base grid — 4 → 128px" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--bg-page); }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { width:24px; background:var(--grad-teal); border-radius:2px 2px 0 0; }
  .tok { font:var(--fs-3xs)/1 var(--font-mono); color:var(--text-faint); }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="tok">1·4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="tok">2·8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="tok">3·12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="tok">4·16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="tok">5·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="tok">6·32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="tok">7·48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="tok">8·64</span></div>
    <div class="col"><div class="bar" style="height:96px"></div><span class="tok">9·96</span></div>
  </div>
</body></html>
