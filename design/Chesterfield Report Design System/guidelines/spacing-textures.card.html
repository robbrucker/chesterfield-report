<!-- @dsCard group="Spacing" viewport="700x150" name="Signature textures" subtitle="Scanline overlay + neon grid wash — the cyberpunk surface vocabulary" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-page); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .panel { height:104px; border:1px solid var(--ink-400); border-radius:var(--radius-sm); position:relative; overflow:hidden; display:grid; place-items:center; }
  .scan { background:var(--ink-700); }
  .scan::after { content:""; position:absolute; inset:0; background:var(--tex-scanlines); opacity:.7; }
  .grid { background-color:var(--ink-800); background-image:var(--tex-grid); background-size:var(--tex-grid-size); }
  .tok { font:var(--fw-bold) var(--fs-2xs)/1 var(--font-mono); letter-spacing:var(--ls-wide); color:var(--neon-teal); position:relative; z-index:1; }
</style></head>
<body>
  <div class="row">
    <div class="panel scan"><span class="tok">--tex-scanlines</span></div>
    <div class="panel grid"><span class="tok">--tex-grid</span></div>
  </div>
</body></html>
