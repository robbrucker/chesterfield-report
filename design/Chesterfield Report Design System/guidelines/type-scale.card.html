<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="11 → 80px ramp across display, sans & mono roles" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--bg-page); }
  .row { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--ink-700); padding:6px 0; }
  .tok { font:var(--fs-3xs)/1 var(--font-mono); color:var(--text-faint); width:120px; flex:none; }
  .samp { font-family:var(--font-display); font-weight:600; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head>
<body>
  <div class="row"><span class="tok">4xl · 60</span><span class="samp" style="font-size:var(--fs-4xl)">Heron</span></div>
  <div class="row"><span class="tok">3xl · 46</span><span class="samp" style="font-size:var(--fs-3xl)">Chesterfield tonight</span></div>
  <div class="row"><span class="tok">2xl · 34</span><span class="samp" style="font-size:var(--fs-2xl)">This Week in the county</span></div>
  <div class="row"><span class="tok">xl · 26</span><span class="samp" style="font-size:var(--fs-xl)">Board approves riverfront plan</span></div>
  <div class="row"><span class="tok">lg · 20</span><span class="samp" style="font-size:var(--fs-lg)">Standfirst / lead paragraph size</span></div>
  <div class="row"><span class="tok">md · 17</span><span class="samp" style="font-size:var(--fs-md);font-family:var(--font-sans);font-weight:400">Body copy — Public Sans at the reading size</span></div>
  <div class="row"><span class="tok">2xs · 12</span><span class="samp" style="font-size:var(--fs-2xs);font-family:var(--font-mono);color:var(--text-muted)">META · TIMESTAMP · LABEL</span></div>
</body></html>
